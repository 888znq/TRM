<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trading Dashboard - LIVE TV</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000432">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
                body {
                    margin: 0;
                    padding: 0;
                    background-color: #000432;
                    color: #c8d0e7;
                    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                    height: 100vh;
                    box-sizing: border-box;
                }
        
                .dashboard-container {
                    display: flex;
                    flex-direction: column;
                    height: 100%;
                    border: none;
                    box-sizing: border-box;
                    background: #000432;
                }
        
                /* --- Quick Pairs Bar (Integrated) --- */
                                                .quick-pairs-inline {
                                                    display: flex;
                                                    flex: 1 1 0%;
                                                    gap: 4px;
                                                    overflow-x: auto;
                                                    scrollbar-width: none;
                                                    padding-right: 6px;
                                                }
                                                .quick-pairs-inline::-webkit-scrollbar {
                                                    display: none;
                                                }
                                                .quick-pair-btn {
                                                                                    flex-grow: 1;
                                                                                    background: #000432;
                                                                                    color: #8892b0;
                                                                                    border: 1px solid #ffffff;
                                                                                    padding: 4px 8px;
                                                                                    font-size: 10px;
                                                                                    font-weight: bold;
                                                                                    cursor: pointer;
                                                                                    border-radius: 6px;
                                                                                    white-space: nowrap;
                                                                                    text-align: center;
                                                                                }
                                                .quick-pair-btn:hover {
                                                    color: #c8d0e7;
                                                }
                                                .quick-pair-btn.active {
                                                    background: #000432;
                                                    color: #ffcc00;
                                                    border: 1px solid #ffffff;
                                                }
                                        
                                                /* --- Bottom Controls --- */
                                                .bottom-controls {
                                                    display: flex;
                                                    flex-wrap: nowrap;
                                                    border: 1px solid #ffffff;
                                                    border-radius: 14px;
                                                    margin: 0 6px 6px 6px;
                                                    height: 64px;
                                                    background-color: #000432;
                                                    flex-shrink: 0;
                                                    gap: 4px;
                                                    padding: 4px 6px;
                                                    justify-content: flex-end;
                                                    align-items: center;
                                                    box-sizing: border-box;
                                                    overflow-x: auto;
                                                    scrollbar-width: none;
                                                }
                                                .bottom-controls::-webkit-scrollbar {
                                                    display: none;
                                                }
                                                        
                                                .control-item {
                                                    flex: 0 0 auto;
                                                    display: flex;
                                                    align-items: center;
                                                    justify-content: center;
                                                    font-size: 12px;
                                                    font-weight: bold;
                                                    padding: 0 2px;
                                                    background: #000432;
                                                    white-space: nowrap;
                                                    gap: 2px;
                                                }
                                                .control-item svg {
                                                    margin-right: 2px !important;
                                                    width: 16px !important;
                                                    height: 16px !important;
                                                }
                                        
                                                select, input {
                                                    background-color: #000432;
                                                    color: #c8d0e7;
                                                    border: 1px solid #ffffff;
                                                    padding: 4px;
                                                    width: 44px;
                                                    border-radius: 6px;
                                                    text-align: center;
                                                    font-family: inherit;
                                                    outline: none;
                                                }
                        
                                input[type=number]::-webkit-inner-spin-button, 
                                input[type=number]::-webkit-outer-spin-button { 
                                    -webkit-appearance: none; 
                                    margin: 0; 
                                }
                                input[type=number] {
                                    -moz-appearance: textfield;
                                }
                        
                                #conn-status {
                                                    display: none !important;
                                                }
                        
                                /* --- Action Buttons --- */
                                                .action-btn {
                                                                                                    border: 1px solid #ffffff;
                                                                                                    padding: 6px 8px !important;
                                                                                                    font-size: 10px;
                                                                                                    font-weight: bold;
                                                                                                    cursor: pointer;
                                                                                                    border-radius: 6px;
                                                                                                    margin: 0 2px !important;
                                                                                                    letter-spacing: 0.05em;
                                                                                                    background: #000432;
                                                                                                }
                .btn-log {
                    color: #8892b0;
                }
                .btn-call {
                    color: #0ecb81;
                }
                .btn-put {
                    color: #f6465d;
                }
        
                /* --- Chart Section --- */
                                .chart-section {
                                    flex: 1;
                                    background-color: #000432;
                                    position: relative;
                                    overflow: hidden;
                                    min-height: 400px;
                                    display: flex;
                                    flex-direction: row;
                                    margin: 6px;
                                    border-radius: 14px;
                                    border: 1px solid #ffffff;
                                }
        
                #canvas-wrapper {
                    width: 100%;
                    height: 100%;
                    position: relative;
                }
        
                #custom-chart {
                                    width: 100%;
                                    height: 100%;
                                    display: block;
                                }
                        
                                .floating-timeframe {
                                                                    position: absolute;
                                                                    bottom: 40px;
                                                                    right: 75px;
                                                                    display: flex;
                                    align-items: center;
                                    background: rgba(0, 4, 50, 0.85);
                                    border: 1px solid #ffffff;
                                    border-radius: 8px;
                                    padding: 4px 8px;
                                    z-index: 20;
                                }
                                .floating-timeframe input {
                                    width: 55px;
                                    background: transparent;
                                    border: none;
                                    color: #c8d0e7;
                                    text-align: center;
                                    font-weight: bold;
                                    outline: none;
                                    padding-right: 2px;
                                }
                                .floating-timeframe input[type=number]::-webkit-inner-spin-button, 
                                .floating-timeframe input[type=number]::-webkit-outer-spin-button { 
                                    -webkit-appearance: auto;
                                    opacity: 1;
                                    margin: 0;
                                }
                                .floating-timeframe input[type=number] {
                                    -moz-appearance: number-input;
                                }
                        
                                #loading-text {
                    color: #ffcc00;
                    font-weight: bold;
                    letter-spacing: 2px;
                    z-index: 10;
                    position: absolute;
                    top: 50%;
                    left: 35%;
                    transform: translate(-50%, -50%);
                }
        
            </style>
</head>
<body>

                                        <div class="control-item">
                                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ffcc00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 5px;"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                                                            <input type="number" id="trade-amount" value="0.35" placeholder="Amount ($)" aria-label="Trade Amount" step="0.01">

            <div class="control-item">
                                        <button id="show-trades-btn" class="action-btn btn-log" aria-label="Trades Log" style="display:inline-flex; align-items:center; justify-content:center; padding: 6px 16px;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg></button>
                                                        <button id="trade-btn" class="action-btn btn-call" aria-label="Buy Call" style="display:inline-flex; align-items:center; justify-content:center; padding: 6px 16px;"><svg width="18" height="18" viewBox="0 0 24 24" fill="#0ecb81" stroke="#0ecb81" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="filter: drop-shadow(0px 0px 4px rgba(14,203,129,0.8));"><polygon points="12 4 2 20 22 20"></polygon></svg></button>
                                                        <button id="trade-btn-put" class="action-btn btn-put" aria-label="Sell Put" style="display:inline-flex; align-items:center; justify-content:center; padding: 6px 16px;"><svg width="18" height="18" viewBox="0 0 24 24" fill="#f6465d" stroke="#f6465d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="filter: drop-shadow(0px 0px 4px rgba(246,70,93,0.8));"><polygon points="12 20 2 4 22 4"></polygon></svg></button>
                        </div>
            <div class="control-item">
                            <span id="balance-display" style="color: #0ecb81; font-weight: bold;">Loading...</span>
                            <span id="conn-status">OFFLINE</span>
                        </div>
                    </div>
                </div>
            
                <div id="tradeModalOverlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000432; z-index:2001;"></div>
                                        <div id="tradeModal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); width:90vw; max-width:420px; height:500px; background:#000432; border-radius: 20px; z-index:2002; flex-direction:column; overflow: hidden; border: 1px solid #ffffff;">
                                                                    <div style="padding:15px; background:#000432; color:#ffcc00; font-weight:800; font-size:12px; letter-spacing:0.1em; display:flex; justify-content:space-between; align-items:center; z-index: 10;">
                                                                        <span>LIVE TRADE TERMINAL</span>

                                            <div id="tradeList" style="flex:1; overflow-y:auto; padding:15px; display:flex; flex-direction:column; gap:10px; background:#000432;">

    <script>
        const TOKEN = "S3hjsHe8DPjF3ia"; 
                const DERIV_WS = "wss://ws.derivws.com/websockets/v3?app_id=132899";
                
                let ws;
                let currentPair = "1HZ100V";
                let tickSubscriptions = {};
                let tradeHistory = []; 
                let marketData = {}; 
                let serverTimeOffset = 0;
                const trackedPairs = [
                                                                    "1HZ10V", "1HZ15V", "1HZ25V", "1HZ30V", "1HZ50V", 
                                                                    "1HZ75V", "1HZ90V", "1HZ100V", "R_10", "R_25", "R_50", "R_75", "R_100"
                                                                ];

        // UI Elements
                const candleTimeInput = document.getElementById('candle-time');
        const balanceDisplay = document.getElementById('balance-display');
        const connStatus = document.getElementById('conn-status');
        const loadingText = document.getElementById('loading-text');

        // --- CUSTOM HTML5 CANVAS CHART ---
                let canvas = document.getElementById('custom-chart') || document.querySelector('canvas');
                let ctx = canvas ? canvas.getContext('2d') : null;
                let canvasWidth, canvasHeight;
        
                function resizeCanvas() {
                                    if (!canvas) {
                                        canvas = document.getElementById('custom-chart') || document.querySelector('canvas');
                                        if (canvas) ctx = canvas.getContext('2d');
                                    }
                                    if (!canvas) return;
                        
                                    const wrapper = document.getElementById('canvas-wrapper');
                                    if (!wrapper) return;
                                    
                                    canvasWidth = wrapper.clientWidth;
                                    canvasHeight = wrapper.clientHeight;
                                    
                                    // Fix Canvas Blur Limitation via Hardware Device Pixel Ratio scaling
                                    const dpr = window.devicePixelRatio || 1;
                                    canvas.width = canvasWidth * dpr;
                                    canvas.height = canvasHeight * dpr;
                                    ctx.scale(dpr, dpr);
                                    canvas.style.width = `${canvasWidth}px`;
                                    canvas.style.height = `${canvasHeight}px`;
                
                                    ctx.imageSmoothingEnabled = true;
                                    ctx.imageSmoothingQuality = 'high';
                                    
                                    drawChart();
                                }
        
        window.addEventListener('resize', resizeCanvas);

        function drawChart() {
                    if (!ctx) return;
                    // Clear the canvas
                    ctx.clearRect(0, 0, canvasWidth, canvasHeight);
                    
                    const currentCandles = marketData[currentPair] || [];
                    if (currentCandles.length === 0) {
                        loadingText.style.display = 'block';
                        return;
                    } else {
                        loadingText.style.display = 'none';
                    }
        
                    // Axis dimensions
            const yAxisWidth = 60;
            const xAxisHeight = 25;
            
            // Constrain the candles strictly to the left 70% of the screen
            const chartAreaWidth = canvasWidth * 0.70; 
            const chartHeight = canvasHeight - xAxisHeight;

            // Dimensions for candles
            const candleWidth = 6;
            const candleSpacing = 4;
            const totalCandleWidth = candleWidth + candleSpacing;

            // Calculate how many candles can fit in the 70% chart width area
            const maxVisibleCandles = Math.floor(chartAreaWidth / totalCandleWidth);
            
            // Get only the ones that fit on screen (newest ones at the end)
                        const visibleCandles = currentCandles.slice(-maxVisibleCandles);
            
                        // Find Min and Max prices in the visible set for Y-axis scaling
            let minPrice = Infinity;
            let maxPrice = -Infinity;
            visibleCandles.forEach(c => {
                if (c.low < minPrice) minPrice = c.low;
                if (c.high > maxPrice) maxPrice = c.high;
            });

            // Add padding top and bottom (10%)
            const priceRange = maxPrice - minPrice || 1; 
            const paddedMin = minPrice - (priceRange * 0.1);
            const paddedMax = maxPrice + (priceRange * 0.1);
            const paddedRange = paddedMax - paddedMin;

            // Helper to get Y pixel coordinate mapped within chartHeight
            function getY(price) {
                return chartHeight - ((price - paddedMin) / paddedRange) * chartHeight;
            }

            // --- DRAW Y-AXIS (PRICE) & GRID LINES ---
            ctx.fillStyle = '#888';
            ctx.font = '11px sans-serif';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'middle';
            
            // Determine decimal places dynamically based on price magnitude
            const dec = paddedMax < 10 ? 5 : (paddedMax < 1000 ? 3 : 2);

            ctx.lineWidth = 1;
            for(let i=1; i<6; i++) {
                let yLine = (chartHeight / 6) * i;
                
                // Draw Horizontal Grid Line (Spans across the 30% gap to connect to the right axis)
                                ctx.strokeStyle = '#ffffff';
                                ctx.lineWidth = 0.2;
                                ctx.beginPath();
                ctx.moveTo(0, yLine);
                ctx.lineTo(canvasWidth - yAxisWidth, yLine);
                ctx.stroke();

                // Draw Y-Axis Label at the far right edge of the screen
                let priceAtLine = paddedMax - (paddedRange * (i/6));
                ctx.fillText(priceAtLine.toFixed(dec), canvasWidth - yAxisWidth + 6, yLine);
            }

            // Draw a subtle dashed divider to outline the 70% chart boundary
                        ctx.strokeStyle = '#ffffff';
                        ctx.lineWidth = 1;
                        ctx.setLineDash([5, 5]);
            ctx.beginPath();
            ctx.moveTo(chartAreaWidth, 0);
            ctx.lineTo(chartAreaWidth, chartHeight);
            ctx.stroke();
            ctx.setLineDash([]); // reset

            // Draw Base axes lines to separate chart from labels
                        ctx.strokeStyle = '#ffffff';
                        ctx.lineWidth = 1;
                        ctx.beginPath();
            ctx.moveTo(0, chartHeight);
            ctx.lineTo(canvasWidth, chartHeight); // Full Bottom line
            ctx.moveTo(canvasWidth - yAxisWidth, 0);
            ctx.lineTo(canvasWidth - yAxisWidth, chartHeight); // Far Right Axis line
            ctx.stroke();

            // --- DRAW CANDLES & X-AXIS (TIME) ---
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'top';
            
                        const lastCandle = currentCandles[currentCandles.length - 1];
            
                        // Loop through candles
            for (let i = 0; i < visibleCandles.length; i++) {
                const c = visibleCandles[i];
                const isUp = c.close >= c.open;
                
                // Color selection
                                const color = isUp ? '#0ecb81' : '#f6465d';
                                ctx.fillStyle = color;
                                ctx.strokeStyle = color;
                                ctx.lineWidth = 1.5;
                                ctx.lineCap = 'round';
                                ctx.lineJoin = 'round';

                // X position: Calculates so the newest candle is exactly on the 70% boundary edge
                const x = chartAreaWidth - ((visibleCandles.length - i) * totalCandleWidth);

                const yOpen = getY(c.open);
                const yClose = getY(c.close);
                const yHigh = getY(c.high);
                const yLow = getY(c.low);

                const bodyTop = Math.min(yOpen, yClose);
                const bodyBottom = Math.max(yOpen, yClose);
                const bodyHeight = Math.max(1, bodyBottom - bodyTop); // Ensure at least 1px height

                // Draw Wick
                ctx.beginPath();
                ctx.moveTo(x + candleWidth / 2, yHigh);
                ctx.lineTo(x + candleWidth / 2, yLow);
                ctx.stroke();

                // Draw Body
                ctx.fillRect(x, bodyTop, candleWidth, bodyHeight);

                // --- Draw X-Axis Label (Time) every ~10th candle to prevent overlap ---
                if (i % 12 === 0 || i === visibleCandles.length - 1) {
                    if (i === visibleCandles.length - 1) ctx.textAlign = 'right';
                    else ctx.textAlign = 'center';

                    const date = new Date(c.time * 1000);
                    const hours = date.getHours().toString().padStart(2, '0');
                    const mins = date.getMinutes().toString().padStart(2, '0');
                    const secs = date.getSeconds().toString().padStart(2, '0');
                    
                    ctx.fillStyle = '#888';
                    ctx.fillText(`${hours}:${mins}:${secs}`, x + candleWidth / 2, chartHeight + 6);
                }
            }


            // --- DRAW OPEN TRADE ENTRY & EXPIRY LINES ---
            if (tradeHistory.length > 0) {
                const lastCandleX = chartAreaWidth - totalCandleWidth;
                const lastCandleCenterX = lastCandleX + (candleWidth / 2);
                const candleDur = getCandleDuration();

                tradeHistory.forEach(t => {
                    if (t.status === 'OPEN' && t.expiry) {
                        const secondsDiff = t.expiry - lastCandle.time;
                        // Map the future time into X space based on candle size
                        const lineX = lastCandleCenterX + ((secondsDiff / candleDur) * totalCandleWidth);
                        const color = t.type === 'CALL' ? '#0ecb81' : '#f6465d';

                        // Draw Vertical Expiry Line
                        if (lineX > 0 && lineX < canvasWidth) {
                            ctx.strokeStyle = color;
                            ctx.lineWidth = 1;
                            ctx.setLineDash([4, 4]); // Dashed line for expiry
                            ctx.beginPath();
                            ctx.moveTo(lineX, 0);
                            ctx.lineTo(lineX, chartHeight);
                            ctx.stroke();
                            ctx.setLineDash([]); // Reset dash

                            // Text Label for Expiry Line
                            ctx.fillStyle = color;
                            ctx.font = 'bold 9px sans-serif';
                            ctx.textAlign = 'center';
                            ctx.textBaseline = 'bottom';
                            ctx.fillText('EXP', lineX, chartHeight - 2);
                        }

                        // Draw Horizontal Entry Price Line strictly from Entry Time to Expiry Time
                        if (t.entry_spot && t.entry_time) {
                            const entryY = getY(t.entry_spot);
                            const entrySecondsDiff = t.entry_time - lastCandle.time;
                            const entryX = lastCandleCenterX + ((entrySecondsDiff / candleDur) * totalCandleWidth);

                            if (entryY > 0 && entryY < chartHeight) {
                                ctx.strokeStyle = color;
                                ctx.lineWidth = 1;
                                ctx.beginPath();
                                ctx.moveTo(entryX, entryY);
                                // Draw precisely to the expiry line
                                ctx.lineTo(Math.min(lineX, canvasWidth), entryY);
                                ctx.stroke();
                                
                                // Draw a small dot at the exact entry point
                                ctx.fillStyle = color;
                                ctx.beginPath();
                                ctx.arc(entryX, entryY, 2.5, 0, Math.PI * 2);
                                ctx.fill();
                            }
                        }
                    }
                });
            }


            // --- DRAW CURRENT PRICE LABEL & TIMER (TRADINGVIEW STYLE) ---
            const currentPrice = lastCandle.close;
            const currentY = getY(currentPrice);
            
            // Determine Box Color
            const isUp = currentPrice >= lastCandle.open;
            const boxColor = isUp ? '#0ecb81' : '#f6465d';

            // 1. Draw a dashed visual line connecting chart to the price box
            ctx.strokeStyle = boxColor;
            ctx.setLineDash([2, 4]);
            ctx.beginPath();
            ctx.moveTo(0, currentY);
            ctx.lineTo(canvasWidth - yAxisWidth, currentY);
            ctx.stroke();
            ctx.setLineDash([]);

            // 2. Calculate remaining candle time
            const duration = getCandleDuration();
            const currentServerTime = Math.floor(Date.now() / 1000) + serverTimeOffset;
            let remaining = Math.max(0, (lastCandle.time + duration) - currentServerTime);
            
            const mins = Math.floor(remaining / 60).toString().padStart(2, '0');
            const secs = (remaining % 60).toString().padStart(2, '0');
            const timerText = `${mins}:${secs}`;

            // 3. Render Solid Price/Timer Background Block on Axis
            const labelHeight = 34;
            const labelY = currentY - labelHeight / 2;

            ctx.fillStyle = boxColor;
            // Overwrite background to cover grid lines underneath
            ctx.fillRect(canvasWidth - yAxisWidth, labelY, yAxisWidth, labelHeight);

            // Add the little pointer triangle that sticks out the left
            ctx.beginPath();
            ctx.moveTo(canvasWidth - yAxisWidth, currentY);
            ctx.lineTo(canvasWidth - yAxisWidth + 5, currentY - 5);
            ctx.lineTo(canvasWidth - yAxisWidth + 5, currentY + 5);
            ctx.fill();

            // 4. Render Text inside the box
            ctx.fillStyle = '#ffffff';
            ctx.textAlign = 'center';
            
            // Current Price Text
            ctx.font = 'bold 11px sans-serif';
            ctx.textBaseline = 'top';
            ctx.fillText(currentPrice.toFixed(dec), canvasWidth - (yAxisWidth / 2) + 2, labelY + 4);
            
            // Countdown Timer Text
            ctx.font = '10px monospace';
            ctx.fillText(timerText, canvasWidth - (yAxisWidth / 2) + 2, labelY + 18);
        }


        // --- WEBSOCKET ENGINE ---
        function connect() {
            ws = new WebSocket(DERIV_WS);

            ws.onopen = () => {
                connStatus.innerText = 'ONLINE';
                connStatus.style.background = '#0ecb81';
                ws.send(JSON.stringify({ authorize: TOKEN }));
            };

            ws.onmessage = (msg) => {
                            const data = JSON.parse(msg.data);
            
                            // ENHANCED ERROR HANDLING FOR FAILED TRADES / BAD TOKENS
                                            if (data.error) {
                                                console.error("API Error:", data.error.message);
                                                
                                                // Intercept and silently ignore the background "Already Subscribed" warning
                                                if (data.error.code === 'AlreadySubscribed' || data.error.message.includes('already subscribed')) {
                                                    return; 
                                                }
            
                                                // Ignore rate limit popups for history ticks since we auto-recover
                                                if (data.error.code === 'RateLimit' || data.error.message.includes('rate limit')) {
                                                    console.warn("Deriv API Rate Limit hit - request ignored.");
                                                    return;
                                                }
                            
                                                if (data.error.code === 'InvalidToken' || data.error.code === 'AuthorizationRequired') {
                                                    alert("⚠️ API ERROR: Your Token does not have 'Trade' permissions.\n\nPlease go to Deriv -> Security -> API Tokens and create a new token with the 'Trade' box checked.");
                                                } else if (data.error.code === 'InvalidContractParameters') {
                                                    alert("⚠️ PARAMETER ERROR: Trading is not available for this Symbol at the selected duration.\n\nTry changing Duration to Minutes (or test on Synthetic Indices).");
                                                } else {
                                                    alert("⚠️ Deriv API Error: " + data.error.message);
                                                                        }
                                                                        return;
                                                                    }
                                        
                                                        if (data.authorize) {
                                                                            ws.send(JSON.stringify({ balance: 1, subscribe: 1 }));
                                                                            // Initialize canvas dimensions before fetching data
                                                                            resizeCanvas();
                                                                            // Lazy Load: Fetch ONLY the active pair to prevent rate limit blocks
                                                                            fetchPairData(currentPair);
                                                                        }
                                                        
                                                                        if (data.balance) {
                                                                    balanceDisplay.innerText = `$${data.balance.balance.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
                                                                }
                
                                if (data.history) {
                                    const symbol = data.echo_req.ticks_history;
                                    processHistory(symbol, data.history.times, data.history.prices);
                                    if (symbol === currentPair) {
                                        loadingText.style.display = 'none'; // Hide loading text once data arrives
                                        drawChart();
                                    }
                                }
                
                                if (data.tick) {
                                    const symbol = data.tick.symbol;
                                    tickSubscriptions[symbol] = data.tick.id;
                                    processLiveTick(symbol, data.tick.epoch, data.tick.quote);
                                }

                // Handle Trades
                if (data.buy) {
                    const cid = data.buy.contract_id;
                    const type = data.echo_req.parameters.contract_type; 
                    const duration = data.echo_req.parameters.duration;
                    const currentServerTime = Math.floor(Date.now() / 1000) + serverTimeOffset;

                    const t = { 
                        id: cid, 
                        type: type,
                        stake: data.buy.buy_price, 
                        status: 'OPEN', 
                        profit: 0,
                        expiry: currentServerTime + duration, // Initial estimate before server confirms exact time
                        entry_spot: null, 
                        entry_time: currentServerTime // Fallback entry time
                    };
                    tradeHistory.push(t);
                    ws.send(JSON.stringify({ proposal_open_contract: 1, contract_id: cid, subscribe: 1 }));
                    updateTradeUI();
                    
                    // Silent logging instead of intrusive alert pop-up
                    console.log(`✅ Trade Executed: ID ${cid} | Type ${type} | Price $${data.buy.buy_price}`);
                }

                if (data.proposal_open_contract) {
                    const c = data.proposal_open_contract;
                    const t = tradeHistory.find(x => x.id === c.contract_id);
                    if (t) {
                        t.profit = c.profit;
                        t.status = c.is_sold ? (c.profit > 0 ? 'WON' : 'LOST') : 'OPEN';
                        
                        // Capture exact exact server entry & expiry for precise charting
                        if (c.date_expiry) t.expiry = c.date_expiry; 
                        if (c.date_start) t.entry_time = c.date_start; 
                        if (c.entry_tick) t.entry_spot = c.entry_tick; 

                        updateTradeUI();
                    }
                }
            };

            ws.onclose = () => {
                connStatus.innerText = 'OFFLINE';
                connStatus.style.background = '#f6465d';
                setTimeout(connect, 3000); 
            };
        }

        // --- TRADES UI MODAL ---
                function updateTradeUI() {
                    const list = document.getElementById('tradeList');
                    if (tradeHistory.length === 0) {
                        list.innerHTML = '<div style="color:#8892b0; text-align:center; padding:20px; font-size:12px; font-weight:bold; letter-spacing:0.05em;">NO TRADES RECORDED IN THIS SESSION</div>';
                        return;
                    }
                    let html = '';
                    [...tradeHistory].reverse().forEach(t => {
                        let color = t.status === 'OPEN' ? '#ffcc00' : (t.status === 'WON' ? '#0ecb81' : '#f6465d');
                        html += `
                                                <div style="display:flex; justify-content:space-between; background:#000432; padding:12px; border-radius:10px; border-left:3px solid ${color}; margin-bottom:10px;">
                            <div style="display:flex; flex-direction:column; gap:4px;">
                                <span style="font-weight:bold; color:white; font-size:12px;">${t.type} <span style="color:#888; font-size:10px;">#${t.id}</span></span>
                                <span style="color:#aaa; font-size:10px;">STAKE: $${t.stake.toFixed(2)}</span>
                            </div>
                            <div style="display:flex; flex-direction:column; gap:4px; text-align:right;">
                                <span style="font-weight:bold; font-size:12px; color:${color};">${t.status}</span>
                                <span style="font-weight:bold; font-size:12px; color:${t.profit > 0 ? '#0ecb81' : (t.profit < 0 ? '#f6465d' : 'white')};">$${t.profit.toFixed(2)}</span>
                            </div>
                        </div>`;
                    });
                    list.innerHTML = html;
                }

        document.getElementById('show-trades-btn').addEventListener('click', () => {
            document.getElementById('tradeModal').style.display = 'flex';
            document.getElementById('tradeModalOverlay').style.display = 'block';
            updateTradeUI();
        });
        document.getElementById('close-modal-btn').addEventListener('click', () => {
            document.getElementById('tradeModal').style.display = 'none';
            document.getElementById('tradeModalOverlay').style.display = 'none';
        });
        document.getElementById('tradeModalOverlay').addEventListener('click', () => {
            document.getElementById('tradeModal').style.display = 'none';
            document.getElementById('tradeModalOverlay').style.display = 'none';
        });

        // --- BULLETPROOF CHART DATA PROCESSORS ---
                function fetchPairData(symbol) {
                    marketData[symbol] = []; 
                    
                    if (tickSubscriptions[symbol]) {
                        ws.send(JSON.stringify({ forget: tickSubscriptions[symbol] }));
                        delete tickSubscriptions[symbol];
                    }
        
                    ws.send(JSON.stringify({
                        ticks_history: symbol,
                        end: "latest",
                        count: 2500, // Adjusted to handle background streaming safely for multiple pairs
                        style: "ticks",
                        subscribe: 1
                    }));
                }
        
                function switchPairView(newPair) {
                    currentPair = newPair;
                    if (!marketData[newPair] || marketData[newPair].length === 0) {
                        loadingText.style.display = 'block';
                        if (ws && ws.readyState === WebSocket.OPEN) fetchPairData(newPair);
                    } else {
                        drawChart();
                    }
                }
        
                function getCandleDuration() {
                                    return (parseInt(candleTimeInput.value) || 8);
                                }
        
                function processHistory(symbol, times, prices) {
                    const duration = getCandleDuration();
                    
                    // Sync local time with server history time to make countdown accurate immediately
                    if (symbol === currentPair && times.length > 0) {
                        serverTimeOffset = times[times.length - 1] - Math.floor(Date.now() / 1000);
                    }
        
                    let candleMap = new Map();
        
                    for (let i = 0; i < times.length; i++) {
                        const group = Math.floor(times[i] / duration) * duration;
                        const p = prices[i];
        
                        if (!candleMap.has(group)) {
                            candleMap.set(group, { time: group, open: p, high: p, low: p, close: p });
                        } else {
                            let c = candleMap.get(group);
                            c.high = Math.max(c.high, p);
                            c.low = Math.min(c.low, p);
                            c.close = p;
                        }
                    }
        
                    marketData[symbol] = Array.from(candleMap.values()).sort((a, b) => a.time - b.time);
                }
        
                function processLiveTick(symbol, epoch, price) {
                    // Keep server sync fresh only based on active chart to avoid weird jump states
                    if (symbol === currentPair) {
                        serverTimeOffset = epoch - Math.floor(Date.now() / 1000);
                    }
        
                    let candles = marketData[symbol];
                    if (!candles || candles.length === 0) return;
        
                    const duration = getCandleDuration();
                    const group = Math.floor(epoch / duration) * duration;
                    let lastCandle = candles[candles.length - 1];
        
                    if (group < lastCandle.time) return;
        
                    if (group === lastCandle.time) {
                        // Update current candle
                        lastCandle.high = Math.max(lastCandle.high, price);
                        lastCandle.low = Math.min(lastCandle.low, price);
                        lastCandle.close = price;
                    } else {
                        // Create new candle
                        const newCandle = { time: group, open: price, high: price, low: price, close: price };
                        candles.push(newCandle);
                        
                        if (candles.length > 2500) candles.shift();
                    }
                    
                    // Re-render HTML5 canvas on new data only if it is the currently visible chart
                                        if (symbol === currentPair) drawChart();
                                    }
                    
                            // --- INPUT EVENT LISTENERS ---
                                    candleTimeInput.addEventListener('change', () => {
                                                loadingText.style.display = 'block';
                                                if (ws && ws.readyState === WebSocket.OPEN) {
                                                    // Clear cached data so unviewed pairs don't render old timeframes, and ONLY re-fetch active pair
                                                    marketData = {};
                                                    fetchPairData(currentPair);
                                                }
                                            });
                                    
                                            function executeTrade(type) {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                alert("Please wait, connecting to server...");
                return;
            }
            const stake = parseFloat(document.getElementById('trade-amount').value) || 10;
            const expirySecs = parseInt(document.getElementById('trade-expiry').value) || 300;
            
            const tradePayload = {
                buy: "1", 
                price: Number(stake * 2), 
                parameters: {
                    amount: Number(stake),
                    basis: "stake",
                    contract_type: type,
                    currency: "USD",
                    duration: expirySecs,
                    duration_unit: "s", 
                    symbol: currentPair 
                }
            };
            ws.send(JSON.stringify(tradePayload));
        }

        // Event listener connections for the buttons
        document.getElementById('trade-btn').addEventListener('click', () => executeTrade("CALL"));
        document.getElementById('trade-btn-put').addEventListener('click', () => executeTrade("PUT"));

        // Boot Data & Intervals
        connect();
        
        // --- QUICK PAIRS BAR LOGIC ---
                const quickPairBtns = document.querySelectorAll('.quick-pair-btn');
        
                function syncQuickBars(selectedPair) {
                    quickPairBtns.forEach(btn => {
                        if (btn.getAttribute('data-val') === selectedPair) {
                            btn.classList.add('active');
                        } else {
                            btn.classList.remove('active');
                        }
                    });
                }
        
                quickPairBtns.forEach(btn => {
                            btn.addEventListener('click', (e) => {
                                const newPair = e.target.getAttribute('data-val');
                                syncQuickBars(newPair);
                                switchPairView(newPair);
                            });
                        });
                
                        // Timer Loop: Ensures the countdown timer ticks every second regardless of market ticks
                        setInterval(() => {
                            if (marketData[currentPair] && marketData[currentPair].length > 0) drawChart();
                        }, 1000);

    </script>
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(registration => {
                        console.log('Service Worker registered successfully:', registration.scope);
                    })
                    .catch(error => {
                        console.log('Service Worker registration failed:', error);
                    });
            });
        }
    </script>
