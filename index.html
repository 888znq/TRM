                }

            });



            const json = await res.json();

            if (!res.ok) {

                const msg = (json.errors && json.errors[0] && json.errors[0].message) || 'Failed to get account';

                throw new Error(msg);

            }



            // Filter the account matching the requested type (real or demo)

            const accounts = Array.isArray(json.data) ? json.data : [];

            const matchedAccount = accounts.find(acct => acct.account_type === accountType);



            if (!matchedAccount) {

                throw new Error(`No ${accountType} account found associated with this token.`);

            }



            return matchedAccount.account_id;

        }



        async function getWsUrl(accountId) {

            const res = await fetch(`${API_BASE}/trading/v1/options/accounts/${accountId}/otp`, {

                method: 'POST',

                headers: {

                    'Deriv-App-ID': APP_ID,

                    'Authorization': `Bearer ${TOKEN}`

            });

            const json = await res.json();

            if (!res.ok) {

                const msg = (json.errors && json.errors[0] && json.errors[0].message) || 'Failed to get OTP';

                throw new Error(msg);

            }

            return json.data.url;

        // --- CUSTOM HTML5 CANVAS CHART ---

        let ctx = canvas ? canvas.getContext('2d') : null;

        function resizeCanvas() {

            if (!canvas) {

                canvas = document.getElementById('custom-chart') || document.querySelector('canvas');

                if (canvas) ctx = canvas.getContext('2d');

            }

            if (!canvas) return;



            const wrapper = document.getElementById('canvas-wrapper');

            if (!wrapper) return;



            canvasWidth = wrapper.clientWidth;

            canvasHeight = wrapper.clientHeight;



            // Fix Canvas Blur Limitation via Hardware Device Pixel Ratio scaling

            const dpr = window.devicePixelRatio || 1;

            canvas.width = canvasWidth * dpr;

            canvas.height = canvasHeight * dpr;

            ctx.scale(dpr, dpr);

            canvas.style.width = `${canvasWidth}px`;

            canvas.style.height = `${canvasHeight}px`;



            ctx.imageSmoothingEnabled = true;

            ctx.imageSmoothingQuality = 'high';

                if (window.ResizeObserver) {

        function drawChart() {

            if (!ctx) return;

            // Clear the canvas

            ctx.clearRect(0, 0, canvasWidth, canvasHeight);



            const currentCandles = marketData[currentPair] || [];

            if (currentCandles.length === 0) {

                loadingText.style.display = 'block';

                return;

            } else {

                loadingText.style.display = 'none';

            }



            // Axis dimensions

                        const yAxisWidth = 48;

                        const xAxisHeight = 25;



            // Constrain the candles strictly to the left 70% of the screen

            const chartAreaWidth = canvasWidth * 0.50;

            const chartHeight = canvasHeight - xAxisHeight;



            // Dimensions for candles

            const candleWidth = 6;

            const candleSpacing = 4;

            const totalCandleWidth = candleWidth + candleSpacing;



            // Calculate how many candles can fit in the 70% chart width area

            const maxVisibleCandles = Math.floor(chartAreaWidth / totalCandleWidth);



            // Get only the ones that fit on screen (newest ones at the end)

            const visibleCandles = currentCandles.slice(-maxVisibleCandles);



            // Find Min and Max prices in the visible set for Y-axis scaling

            let minPrice = Infinity;

            let maxPrice = -Infinity;

            visibleCandles.forEach(c => {

                if (c.low < minPrice) minPrice = c.low;

                if (c.high > maxPrice) maxPrice = c.high;

            });



            // Add padding top and bottom (2%)
            
                        const priceRange = maxPrice - minPrice || 1;
            
                        const paddedMin = minPrice - (priceRange * 0.02);
            
                        const paddedMax = maxPrice + (priceRange * 0.02);
            
                        const paddedRange = paddedMax - paddedMin;



            // Helper to get Y pixel coordinate mapped within chartHeight

            function getY(price) {

                return chartHeight - ((price - paddedMin) / paddedRange) * chartHeight;

            }



            // --- DRAW Y-AXIS (PRICE) & GRID LINES ---

            ctx.fillStyle = '#888';

            ctx.font = '11px sans-serif';

            ctx.textAlign = 'left';

            ctx.textBaseline = 'middle';



            // Determine decimal places dynamically based on price magnitude

            const dec = paddedMax < 10 ? 5 : (paddedMax < 1000 ? 3 : 2);



            ctx.lineWidth = 1;

            for(let i=1; i<6; i++) {

                let yLine = (chartHeight / 6) * i;



                // Draw Horizontal Grid Line (Spans across the 30% gap to connect to the right axis)

                ctx.strokeStyle = '#ffffff';

                ctx.lineWidth = 0.2;

                ctx.beginPath();

                ctx.moveTo(0, yLine);

                ctx.lineTo(canvasWidth - yAxisWidth, yLine);

                ctx.stroke();



                // Draw Y-Axis Label at the far right edge of the screen

                                let priceAtLine = paddedMax - (paddedRange * (i/6));

                                ctx.fillText(priceAtLine.toFixed(dec), canvasWidth - yAxisWidth + 6, yLine);

                            }

                

                            // --- DRAW X-AXIS (TIME) VERTICAL GRID LINES ---

                            ctx.strokeStyle = '#ffffff';

                            ctx.lineWidth = 0.2;

                            for (let i = 0; i < visibleCandles.length; i++) {

                                if (i % 12 === 0 || i === visibleCandles.length - 1) {

                                    const xLine = chartAreaWidth - ((visibleCandles.length - i) * totalCandleWidth) + (candleWidth / 2);

                                    ctx.beginPath();

                                    ctx.moveTo(xLine, 0);

                                    ctx.lineTo(xLine, chartHeight);

                                    ctx.stroke();

                                }

                            }

                

                            // Draw Base axes lines to separate chart from labels
                            
                                                        ctx.strokeStyle = '#ffffff';
                            
                                                        ctx.lineWidth = 1;
                            
                                        ctx.beginPath();
                            
                                        ctx.moveTo(0, chartHeight);
                            
                                        ctx.lineTo(canvasWidth, chartHeight); // Full Bottom line
                            
                                        ctx.moveTo(canvasWidth - yAxisWidth, 0);
                            
                                        ctx.lineTo(canvasWidth - yAxisWidth, chartHeight); // Far Right Axis line
                            
                                        ctx.moveTo(0, 0);
                            
                                        ctx.lineTo(canvasWidth, 0); // Top line
                            
                                        ctx.moveTo(0, 0);
                            
                                        ctx.lineTo(0, chartHeight); // Left Axis line
                            
                                        ctx.stroke();



            // --- DRAW CANDLES & X-AXIS (TIME) ---

            ctx.textAlign = 'center';

            ctx.textBaseline = 'top';



            const lastCandle = currentCandles[currentCandles.length - 1];



            // Loop through candles

            for (let i = 0; i < visibleCandles.length; i++) {

                const c = visibleCandles[i];

                const isUp = c.close >= c.open;



                // Color selection

                const color = isUp ? '#0ecb81' : '#f6465d';

                ctx.fillStyle = color;

                ctx.strokeStyle = color;

                ctx.lineWidth = 1.5;

                ctx.lineCap = 'round';

                ctx.lineJoin = 'round';



                // X position: Calculates so the newest candle is exactly on the 70% boundary edge

                const x = chartAreaWidth - ((visibleCandles.length - i) * totalCandleWidth);



                const yOpen = getY(c.open);

                const yClose = getY(c.close);

                const yHigh = getY(c.high);

                const yLow = getY(c.low);



                const bodyTop = Math.min(yOpen, yClose);

                const bodyBottom = Math.max(yOpen, yClose);

                const bodyHeight = Math.max(1, bodyBottom - bodyTop); // Ensure at least 1px height



                // Draw Wick

                ctx.beginPath();

                ctx.moveTo(x + candleWidth / 2, yHigh);

                ctx.lineTo(x + candleWidth / 2, yLow);

                ctx.stroke();



                // Draw Body

                ctx.fillRect(x, bodyTop, candleWidth, bodyHeight);



                // --- Draw X-Axis Label (Time) every ~10th candle to prevent overlap ---

                if (i % 12 === 0 || i === visibleCandles.length - 1) {

                    if (i === visibleCandles.length - 1) ctx.textAlign = 'right';

                    else ctx.textAlign = 'center';



                    const date = new Date(c.time * 1000);

                    const hours = date.getHours().toString().padStart(2, '0');

                    const mins = date.getMinutes().toString().padStart(2, '0');

                    const secs = date.getSeconds().toString().padStart(2, '0');



                    ctx.fillStyle = '#888';

                    ctx.fillText(`${hours}:${mins}:${secs}`, x + candleWidth / 2, chartHeight + 6);

                }

            }





            // --- DRAW OPEN TRADE ENTRY & EXPIRY LINES ---

                        if (tradeHistory.length > 0) {

                            const lastCandleX = chartAreaWidth - totalCandleWidth;

                            const lastCandleCenterX = lastCandleX + (candleWidth / 2);

                            const candleDur = getCandleDuration();

                            const tradeCheckTime = Math.floor(Date.now() / 1000) + serverTimeOffset;

            

                            tradeHistory.forEach(t => {

                                if (t.status === 'OPEN' && t.expiry && tradeCheckTime < t.expiry) {

                                    const secondsDiff = t.expiry - lastCandle.time;

                                    // Map the future time into X space based on candle size

                                    const lineX = lastCandleCenterX + ((secondsDiff / candleDur) * totalCandleWidth);

                                    const color = t.type === 'CALL' ? '#0ecb81' : '#f6465d';

            

                                    // Draw Vertical Expiry Line

                                                                        if (lineX > 0 && lineX < canvasWidth) {

                                                                            ctx.strokeStyle = color;

                                                                            ctx.lineWidth = 1;

                                                                            ctx.beginPath();

                                                                            ctx.moveTo(lineX, 0);

                                                                            ctx.lineTo(lineX, chartHeight);

                                                                            ctx.stroke();

                                    

                                                                            // Text Label for Expiry Line

                                                                            ctx.fillStyle = color;

                                                                            ctx.font = 'bold 9px sans-serif';

                                                                            ctx.textAlign = 'center';

                                                                            ctx.textBaseline = 'bottom';

                                                                            ctx.fillText('EXP', lineX, chartHeight - 2);

                                                                        }

            

                                    // Draw Horizontal Entry Price Line strictly from Entry Time to Expiry Time

                                                                        if (t.entry_spot != null && t.entry_time) {

                                                                            const entryY = getY(t.entry_spot);

                                                                            const entrySecondsDiff = t.entry_time - lastCandle.time;

                                                                            const entryX = lastCandleCenterX + ((entrySecondsDiff / candleDur) * totalCandleWidth);

                                    

                                                                            // Clamp Y so the line still renders even if the entry

                                                                            // price sits outside the current padded price range.

                                                                            const clampedEntryY = Math.max(0, Math.min(chartHeight, entryY));

                                    

                                                                            ctx.strokeStyle = color;

                                                                            ctx.lineWidth = 1;

                                                                            ctx.beginPath();

                                                                            ctx.moveTo(Math.max(0, entryX), clampedEntryY);

                                                                            // Draw precisely to the expiry line

                                                                            ctx.lineTo(Math.min(lineX, canvasWidth), clampedEntryY);

                                                                            ctx.stroke();

                                    

                                                                            // Draw a small dot at the exact entry point (only if in view)

                                                                            if (entryY >= 0 && entryY <= chartHeight) {

                                                                                ctx.fillStyle = color;

                                                                                ctx.beginPath();

                                                                                ctx.arc(entryX, entryY, 2.5, 0, Math.PI * 2);

                                                                                ctx.fill();

                                                                            }

                                                                        }

                                }

                            });

                        }





            // --- DRAW CURRENT PRICE LABEL & TIMER (TRADINGVIEW STYLE) ---

            const currentPrice = lastCandle.close;

            const currentY = getY(currentPrice);



            // Determine Box Color

            const isUp = currentPrice >= lastCandle.open;

            const boxColor = isUp ? '#0ecb81' : '#f6465d';



            // 1. Draw a dashed visual line connecting chart to the price box

            ctx.strokeStyle = boxColor;

            ctx.setLineDash([2, 4]);

            ctx.beginPath();

            ctx.moveTo(0, currentY);

            ctx.lineTo(canvasWidth - yAxisWidth, currentY);

            ctx.stroke();

            ctx.setLineDash([]);



            // 2. Calculate remaining candle time

            const duration = getCandleDuration();

            const currentServerTime = Math.floor(Date.now() / 1000) + serverTimeOffset;

            let remaining = Math.max(0, (lastCandle.time + duration) - currentServerTime);



            const mins = Math.floor(remaining / 60).toString().padStart(2, '0');

            const secs = (remaining % 60).toString().padStart(2, '0');

            const timerText = `${mins}:${secs}`;



            // 3. Render Solid Price/Timer Background Block on Axis

            const labelHeight = 34;

            const labelY = currentY - labelHeight / 2;



            ctx.fillStyle = boxColor;

            // Overwrite background to cover grid lines underneath

            ctx.fillRect(canvasWidth - yAxisWidth, labelY, yAxisWidth, labelHeight);



            // Add the little pointer triangle that sticks out the left

            ctx.beginPath();

            ctx.moveTo(canvasWidth - yAxisWidth, currentY);

            ctx.lineTo(canvasWidth - yAxisWidth + 5, currentY - 5);

            ctx.lineTo(canvasWidth - yAxisWidth + 5, currentY + 5);

            ctx.fill();



            // 4. Render Text inside the box

            ctx.fillStyle = '#ffffff';

            ctx.textAlign = 'center';



            // Current Price Text

            ctx.font = 'bold 11px sans-serif';

            ctx.textBaseline = 'top';

            ctx.fillText(currentPrice.toFixed(dec), canvasWidth - (yAxisWidth / 2) + 2, labelY + 4);



            // Countdown Timer Text

            ctx.font = '10px monospace';

            ctx.fillText(timerText, canvasWidth - (yAxisWidth / 2) + 2, labelY + 18);

        }





        // --- WEBSOCKET ENGINE (NEW API: REST handshake -> OTP -> WS URL) ---

        async function connect() {

            connStatus.innerText = 'CONNECTING';

            connStatus.style.background = '#ffcc00';



            let wsUrl;

            try {

                const accountId = await getRealAccountId(currentAccountType);

                wsUrl = await getWsUrl(accountId);

            } catch (err) {

                console.error("Auth handshake failed:", err);

                alert("⚠️ Deriv Auth Error: " + err.message);

                connStatus.innerText = 'OFFLINE';

                connStatus.style.background = '#f6465d';

                setTimeout(connect, 5000);

                return;

            }



            ws = new WebSocket(wsUrl);



            ws.onopen = () => {

                connStatus.innerText = 'ONLINE';

                connStatus.style.background = '#0ecb81';

                ws.send(JSON.stringify({ balance: 1, subscribe: 1 }));

                resizeCanvas();

                fetchPairData(currentPair);

                fetchPayouts();

            };



            ws.onmessage = (msg) => {

                const data = JSON.parse(msg.data);



                // ENHANCED ERROR HANDLING FOR FAILED TRADES / BAD TOKENS

                if (data.error) {

                    console.error("API Error:", data.error.message);



                    if (data.error.code === 'AlreadySubscribed' || data.error.message.includes('already subscribed')) {

                        return;

                    }



                    if (data.error.code === 'RateLimit' || data.error.message.includes('rate limit')) {

                        console.warn("Deriv API Rate Limit hit - request ignored.");

                        return;

                    }



                    var _isProposalReq = data.echo_req && data.echo_req.proposal === 1;
                    
                                        if (_isProposalReq) {
                    
                                            console.warn("Proposal unavailable for " + data.echo_req.underlying_symbol + ": " + data.error.message);
                    
                                            return;
                    
                                        }
                    
                                        if (data.error.code === 'InvalidToken' || data.error.code === 'AuthorizationRequired') {
                    
                                            alert("⚠️ API ERROR: Your session is no longer valid.\n\nThe page will attempt to reconnect automatically.");
                    
                                        } else if (data.error.code === 'InvalidContractParameters') {
                    
                                            alert("⚠️ PARAMETER ERROR: Trading is not available for this Symbol at the selected duration.\n\nTry changing Duration to Minutes (or test on Synthetic Indices).");
                    
                                        } else {
                    
                                            alert("⚠️ Deriv API Error: " + data.error.message);
                    
                                        }
                    
                                        return;
                    
                                    }



                if (data.balance) {

                                    balanceDisplay.innerText = `$${data.balance.balance.toLocaleString(undefined, {minimumFractionDigits: 2})}`;

                                    balanceDisplay.style.color = currentAccountType === 'real' ? '#0ecb81' : '#ffcc00';

                                }



                if (data.history) {

                    const symbol = data.echo_req.ticks_history;

                    processHistory(symbol, data.history.times, data.history.prices);

                    if (symbol === currentPair) {

                        loadingText.style.display = 'none';

                        drawChart();

                    }

                }



                if (data.tick) {

                    const symbol = data.tick.symbol;

                    tickSubscriptions[symbol] = data.tick.id;

                    processLiveTick(symbol, data.tick.epoch, data.tick.quote);

                }



                if (data.proposal) {

                    const symbol = data.echo_req.underlying_symbol;

                    payoutSubscriptions[symbol] = data.proposal.id;

                    const stake = Number(data.proposal.ask_price) || 0;

                    const payout = Number(data.proposal.payout) || 0;

                    const span = document.getElementById(`payout-${symbol}`);

                    if (span && stake > 0) {

                        const pct = ((payout - stake) / stake) * 100;

                        span.innerText = `${pct.toFixed(0)}%`;

                    }

                }



                // Handle Trades

                if (data.buy) {

                                    const cid = data.buy.contract_id;

                                    const type = data.echo_req.parameters.contract_type;

                                    const duration = data.echo_req.parameters.duration;

                                    const boughtSymbol = data.echo_req.parameters.underlying_symbol;

                                    const currentServerTime = Math.floor(Date.now() / 1000) + serverTimeOffset;

                

                                    // proposal_open_contract isn't confirmed on the new API yet, so we

                                    // can't rely on entry_tick. Use the latest known price for the traded

                                    // symbol (falling back to the currently viewed pair) as entry spot.

                                    let capturedEntrySpot = null;

                                    const symbolCandles = marketData[boughtSymbol];

                                    if (symbolCandles && symbolCandles.length > 0) {

                                        capturedEntrySpot = symbolCandles[symbolCandles.length - 1].close;

                                    } else {

                                        const fallbackCandles = marketData[currentPair];

                                        if (fallbackCandles && fallbackCandles.length > 0) {

                                            capturedEntrySpot = fallbackCandles[fallbackCandles.length - 1].close;

                                        }

                                    }

                

                                    const t = {

                                        id: cid,

                                        type: type,

                                        stake: data.buy.buy_price,

                                        status: 'OPEN',

                                        profit: 0,

                                        expiry: data.buy.start_time ? (data.buy.start_time + duration) : (currentServerTime + duration),

                                        entry_spot: capturedEntrySpot,

                                        entry_time: data.buy.start_time || currentServerTime

                                    };

                                    tradeHistory.push(t);

                                    updateTradeUI();

                

                                    console.log(`✅ Trade Executed: ID ${cid} | Type ${type} | Price $${data.buy.buy_price}`);

                                }



                if (data.proposal_open_contract) {

                    const c = data.proposal_open_contract;

                    const t = tradeHistory.find(x => x.id === c.contract_id);

                    if (t) {

                        t.profit = c.profit;

                        t.status = c.is_sold ? (c.profit > 0 ? 'WON' : 'LOST') : 'OPEN';



                        if (c.date_expiry) t.expiry = c.date_expiry;

                        if (c.date_start) t.entry_time = c.date_start;

                        if (c.entry_tick) t.entry_spot = c.entry_tick;



                        updateTradeUI();

                    }

                }

            };



            ws.onclose = () => {

                connStatus.innerText = 'OFFLINE';

                connStatus.style.background = '#f6465d';

                setTimeout(connect, 3000);

            };



            ws.onerror = (e) => {

                console.error("WebSocket error:", e);

            };

        }

        // --- BULLETPROOF CHART DATA PROCESSORS ---

        function fetchPairData(symbol) {

            marketData[symbol] = [];



            if (tickSubscriptions[symbol]) {

                ws.send(JSON.stringify({ forget: tickSubscriptions[symbol] }));

                delete tickSubscriptions[symbol];

            }



            ws.send(JSON.stringify({

                ticks_history: symbol,

                end: "latest",

                count: 2500,

                style: "ticks",

                subscribe: 1

            }));

        }



        function fetchPayouts() {

            if (!ws || ws.readyState !== WebSocket.OPEN) return;

            const stake = parseFloat(document.getElementById('trade-amount').value) || 10;

            const expirySecs = parseInt(document.getElementById('trade-expiry').value) || 300;



            trackedPairs.forEach(symbol => {

                if (payoutSubscriptions[symbol]) {

                    ws.send(JSON.stringify({ forget: payoutSubscriptions[symbol] }));

                    delete payoutSubscriptions[symbol];

                }

                ws.send(JSON.stringify({

                    proposal: 1,

                    subscribe: 1,

                    amount: Number(stake),

                    basis: "stake",

                    contract_type: "CALL",

                    currency: "USD",

                    duration: expirySecs,

                    duration_unit: "s",

                    underlying_symbol: symbol

                }));

            });

        }



        function switchPairView(newPair) {

            currentPair = newPair;

            if (!marketData[newPair] || marketData[newPair].length === 0) {

                loadingText.style.display = 'block';

                if (ws && ws.readyState === WebSocket.OPEN) fetchPairData(newPair);

            } else {

                drawChart();

            }

        }



        function getCandleDuration() {

            return (parseInt(candleTimeInput.value) || 8);

        }



        function processHistory(symbol, times, prices) {

            const duration = getCandleDuration();



            if (symbol === currentPair && times.length > 0) {

                serverTimeOffset = times[times.length - 1] - Math.floor(Date.now() / 1000);

            }



            let candleMap = new Map();



            for (let i = 0; i < times.length; i++) {

                const group = Math.floor(times[i] / duration) * duration;

                const p = prices[i];



                if (!candleMap.has(group)) {

                    candleMap.set(group, { time: group, open: p, high: p, low: p, close: p });

                } else {

                    let c = candleMap.get(group);

                    c.high = Math.max(c.high, p);

                    c.low = Math.min(c.low, p);

                    c.close = p;

                }

            }



            marketData[symbol] = Array.from(candleMap.values()).sort((a, b) => a.time - b.time);

        }



        function processLiveTick(symbol, epoch, price) {

            if (symbol === currentPair) {

                serverTimeOffset = epoch - Math.floor(Date.now() / 1000);

            }



            let candles = marketData[symbol];

            if (!candles || candles.length === 0) return;



            const duration = getCandleDuration();

            const group = Math.floor(epoch / duration) * duration;

            let lastCandle = candles[candles.length - 1];



            if (group < lastCandle.time) return;



            if (group === lastCandle.time) {

                lastCandle.high = Math.max(lastCandle.high, price);

                lastCandle.low = Math.min(lastCandle.low, price);

                lastCandle.close = price;

            } else {

                const newCandle = { time: group, open: price, high: price, low: price, close: price };

                candles.push(newCandle);



                if (candles.length > 2500) candles.shift();

            }



            if (symbol === currentPair) drawChart();

        }



        candleTimeInput.addEventListener('change', () => {

            loadingText.style.display = 'block';

            if (ws && ws.readyState === WebSocket.OPEN) {

                marketData = {};

                fetchPairData(currentPair);

            }

        });



        document.getElementById('trade-amount').addEventListener('change', fetchPayouts);

        document.getElementById('trade-expiry').addEventListener('change', fetchPayouts);



        function executeTrade(type) {

            if (!ws || ws.readyState !== WebSocket.OPEN) {

                alert("Please wait, connecting to server...");

                return;

            }

            const stake = parseFloat(document.getElementById('trade-amount').value) || 10;

            const expirySecs = parseInt(document.getElementById('trade-expiry').value) || 300;



            const tradePayload = {

                buy: "1",

                price: Number(stake * 2),

                parameters: {

                    amount: Number(stake),

                    basis: "stake",

                    contract_type: type,

                    currency: "USD",

                    duration: expirySecs,

                    duration_unit: "s",

                    underlying_symbol: currentPair

                }

            };

            ws.send(JSON.stringify(tradePayload));

        }



        document.getElementById('trade-btn').addEventListener('click', () => executeTrade("CALL"));

                document.getElementById('trade-btn-put').addEventListener('click', () => executeTrade("PUT"));

                document.getElementById('trade-btn-row2').addEventListener('click', () => executeTrade("CALL"));

                document.getElementById('trade-btn-put-row2').addEventListener('click', () => executeTrade("PUT"));



        connect();



        const quickPairBtns = document.querySelectorAll('.quick-pair-btn');
                showOnlyPair(currentPair);
                
                        window.addEventListener('message', (event) => {
                                                    const raw = event.data?.trinityOS_pair;
                                                    if (!raw || typeof raw !== 'string') return;
                                                    const pair = resolveTrackedPair(raw);
                                                    if (!pair) return;
                                                    receiveTrinityPair(pair);
                                                });
                        
                                                function resolveTrackedPair(raw) {
                                                    if (trackedPairs.includes(raw)) return raw;
                                                    var match = trackedPairs.find(function(p) {
                                                        return p.replace(/^(frx|cry|1HZ)/i, '').toUpperCase() === raw.toUpperCase();
                                                    });
                                                    return match || null;
                                                }
                                        
                                                function receiveTrinityPair(pair) {
                                                    if (!trackedPairs.includes(pair)) trackedPairs.push(pair);
                                                    ensureQuickPairButton(pair);
                                                    switchPairView(pair);
                                                    syncQuickBars(pair);
                                                    showOnlyPair(pair);
                                                    if (ws && ws.readyState === WebSocket.OPEN) subscribeSinglePayout(pair);
                                                }

                                                // ANDROID CLIPBOARD BRIDGE — native split-pane WebView panes have no
                                                // window.postMessage relationship to each other, so the listener above
                                                // never fires there (it's kept as-is for desktop/Electron, where it
                                                // still works). This polls window.AndroidClipboard instead — the same
                                                // native ClipboardManager bridge trinity_sync.js and FFT.html's
                                                // syncPairToBrokers() write the raw Deriv symbol to — and feeds
                                                // whatever it finds through the exact same resolveTrackedPair() /
                                                // receiveTrinityPair() pipeline the postMessage path uses.
                                                let lastAndroidClipPair = null;
                                                if (window.AndroidClipboard) {
                                                    setInterval(() => {
                                                        const raw = (window.AndroidClipboard.read() || '').trim();
                                                        if (!raw || raw === lastAndroidClipPair) return;
                                                        lastAndroidClipPair = raw;
                                                        const pair = resolveTrackedPair(raw);
                                                        if (pair) receiveTrinityPair(pair);
                                                    }, 400);
                                                }
        
                        function showOnlyPair(pair) {
                            document.querySelectorAll('.quick-pair-btn').forEach(btn => {
                                btn.style.display = (btn.getAttribute('data-val') === pair) ? 'flex' : 'none';
                            });
                        }
        
                function subscribeSinglePayout(symbol) {
                    const stake = parseFloat(document.getElementById('trade-amount').value) || 10;
                    const expirySecs = parseInt(document.getElementById('trade-expiry').value) || 300;
                    if (payoutSubscriptions[symbol]) {
                        ws.send(JSON.stringify({ forget: payoutSubscriptions[symbol] }));
                        delete payoutSubscriptions[symbol];
                    }
                    ws.send(JSON.stringify({
                        proposal: 1, subscribe: 1, amount: Number(stake), basis: "stake",
                        contract_type: "CALL", currency: "USD",
                        duration: expirySecs, duration_unit: "s", underlying_symbol: symbol
                    }));
                }
        
                function ensureQuickPairButton(pair) {
                    const container = document.getElementById('quick-pairs-container');
                    if (!container || document.querySelector(`.quick-pair-btn[data-val="${pair}"]`)) return;
                    const label = pair.replace(/^(frx|cry|1HZ)/i, '');
                    const btn = document.createElement('button');
                    btn.className = 'quick-pair-btn';
                    btn.setAttribute('data-val', pair);
                    btn.style.cssText = 'border:none;border-right:1px solid #ffffff !important;border-radius:0;background:transparent;color:#c8d0e7;padding:0 12px;margin:0;height:100%;font-size:12px;font-weight:bold;';
                    btn.innerHTML = `${label} <span class="payout-pct" id="payout-${pair}">--%</span>`;
                    btn.addEventListener('click', () => { syncQuickBars(pair); switchPairView(pair); });
                    const timeInput = document.getElementById('candle-time');
                    container.insertBefore(btn, timeInput);
                }



        function syncQuickBars(selectedPair) {
                    document.querySelectorAll('.quick-pair-btn').forEach(btn => {
                        const isSel = btn.getAttribute('data-val') === selectedPair;
                        btn.classList.toggle('active', isSel);
                        btn.style.color = isSel ? '#00e5ff' : '#c8d0e7';
                        const payoutSpan = btn.querySelector('.payout-pct');
                        if (payoutSpan) payoutSpan.style.color = isSel ? '#00e5ff' : 'inherit';
                    });
                }



        quickPairBtns.forEach(btn => {

            btn.addEventListener('click', (e) => {

                const newPair = e.target.getAttribute('data-val');

                syncQuickBars(newPair);

                switchPairView(newPair);

            });

        });



        setInterval(() => {

            if (marketData[currentPair] && marketData[currentPair].length > 0) drawChart();

        }, 1000);



        const fullscreenBtn = document.getElementById('fullscreen-btn');

        const dashboardEl = document.querySelector('.dashboard-container');



        fullscreenBtn.addEventListener('click', () => {

            if (dashboardEl.requestFullscreen) {

                dashboardEl.requestFullscreen();

            } else if (dashboardEl.webkitRequestFullscreen) {

                dashboardEl.webkitRequestFullscreen();

            }

            fullscreenBtn.style.display = 'none';

        });



        document.addEventListener('fullscreenchange', () => {

            if (!document.fullscreenElement) {

                fullscreenBtn.style.display = 'flex';

            }

        });

        document.addEventListener('webkitfullscreenchange', () => {

            if (!document.webkitFullscreenElement) {

                fullscreenBtn.style.display = 'flex';

            }

        });



        document.getElementById('zoom-in-btn').addEventListener('click', () => {

            zoomLevel = Math.min(zoomLevel + 1, 300);

            applyZoom();

        });

        document.getElementById('zoom-out-btn').addEventListener('click', () => {

            zoomLevel = Math.max(zoomLevel - 1, 20);

            applyZoom();

        });



        const accountToggleBtn = document.getElementById('account-toggle-btn');

                function updateAccountToggleUI() {

                    if (currentAccountType === 'real') {

                        accountToggleBtn.innerText = 'LIVE';

                        accountToggleBtn.style.color = '#0ecb81';

                        accountToggleBtn.style.borderColor = '#0ecb81';

                        balanceDisplay.style.color = '#0ecb81';

                    } else {

                        accountToggleBtn.innerText = 'DEMO';

                        accountToggleBtn.style.color = '#ffcc00';

                        accountToggleBtn.style.borderColor = '#ffcc00';

                        balanceDisplay.style.color = '#ffcc00';

                    }

                }

        balanceDisplay.style.cursor = 'pointer';

                balanceDisplay.addEventListener('click', () => {

                    currentAccountType = currentAccountType === 'real' ? 'demo' : 'real';

                    updateAccountToggleUI();

                    balanceDisplay.innerText = 'Loading...';

                    tickSubscriptions = {};

                    payoutSubscriptions = {};

                    marketData = {};

                    if (ws) {

                        ws.onclose = null;

                        ws.close();

                    }

                    connect();

                });

                updateAccountToggleUI();



    </script>

            window.addEventListener('load', () => {

                navigator.serviceWorker.register('sw.js')

                    .then(registration => {

                        console.log('Service Worker registered successfully:', registration.scope);

                    })

                    .catch(error => {

                        console.log('Service Worker registration failed:', error);

                    });

            });

        }
